<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pago cancelado | Cremas Tita Shop</title>
  <style>
    body { font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif; background:#fff8f2; margin:0; color:#2e2623; display:grid; place-items:center; min-height:100vh; padding:16px; }
    .box { max-width:520px; width:100%; background:#fff; border:1px solid #ecd9cc; border-radius:14px; padding:20px; text-align:center; }
    h1 { color:#8a5a44; margin-bottom:8px; }
    p { color:#5f514a; }
    .actions { margin-top:14px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
    .btn { text-decoration:none; padding:10px 14px; border-radius:10px; font-weight:700; }
    .btn-main { background:#8a5a44; color:#fff; }
    .btn-alt { border:1px solid #8a5a44; color:#8a5a44; background:#fff; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Pago cancelado</h1>
    <p>No se realizó ningún cobro. Puedes volver y completar el pago cuando quieras.</p>
    <div class="actions">
      <a class="btn btn-main" href="checkout.html">Intentar de nuevo</a>
      <a class="btn btn-alt" href="index.html">Volver a tienda</a>
    </div>
  </div>
</body>
</html>
